name: build

# Builds standalone, no-Python-needed executables of ChromIQ-MeterCheck for
# macOS (Apple Silicon + Intel), Windows and Linux. On a pushed tag (v*) the
# binaries are attached to a GitHub Release so users can just download and run.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/attach the Release on a tag

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            artifact: ChromIQ-MeterCheck-macOS-arm64
          - os: macos-13        # Intel
            artifact: ChromIQ-MeterCheck-macOS-x86_64
          - os: windows-latest
            artifact: ChromIQ-MeterCheck-Windows-x86_64
          - os: ubuntu-latest
            artifact: ChromIQ-MeterCheck-Linux-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build standalone executable
        run: pyinstaller --onefile --console --name ChromIQ-MeterCheck metercheck.py

      - name: Rename for platform (Unix)
        if: runner.os != 'Windows'
        run: mv dist/ChromIQ-MeterCheck "dist/${{ matrix.artifact }}"

      - name: Rename for platform (Windows)
        if: runner.os == 'Windows'
        run: ren dist\ChromIQ-MeterCheck.exe ${{ matrix.artifact }}.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}*
