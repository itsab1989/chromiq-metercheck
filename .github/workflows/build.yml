name: build

# Builds standalone, no-Python-needed executables of ChromIQ-MeterCheck for
# every desktop target: macOS (universal2 + per-arch), Windows (x64 / x86 /
# arm64) and Linux (x86_64 / arm64). On a pushed tag (v*) the binaries are
# attached to a GitHub Release so users can just download and run.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/attach the Release on a tag

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- macOS -------------------------------------------------------
          - os: macos-14            # universal2 (Intel + Apple Silicon in one)
            artifact: ChromIQ-MeterCheck-macOS-universal
            pyi_extra: "--target-arch universal2"
          - os: macos-14            # Apple Silicon only
            artifact: ChromIQ-MeterCheck-macOS-arm64
          # (Intel Macs are covered by the universal2 build above.)
          # ---- Windows -----------------------------------------------------
          - os: windows-latest
            artifact: ChromIQ-MeterCheck-Windows-x86_64
            py_arch: x64
          - os: windows-latest
            artifact: ChromIQ-MeterCheck-Windows-x86
            py_arch: x86
          - os: windows-11-arm
            artifact: ChromIQ-MeterCheck-Windows-arm64
            py_arch: arm64
          # ---- Linux -------------------------------------------------------
          - os: ubuntu-latest
            artifact: ChromIQ-MeterCheck-Linux-x86_64
          - os: ubuntu-24.04-arm
            artifact: ChromIQ-MeterCheck-Linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.py_arch || '' }}

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build standalone executable
        run: pyinstaller --onefile --console ${{ matrix.pyi_extra }} --name ChromIQ-MeterCheck metercheck.py

      - name: Rename for platform (Unix)
        if: runner.os != 'Windows'
        run: mv dist/ChromIQ-MeterCheck "dist/${{ matrix.artifact }}"

      - name: Rename for platform (Windows)
        if: runner.os == 'Windows'
        run: ren dist\ChromIQ-MeterCheck.exe ${{ matrix.artifact }}.exe

      # On macOS a bare CLI binary loses its +x bit on download and has no
      # extension, so Finder opens it in TextEdit. We instead ship a .zip
      # containing a double-clickable .command launcher that clears the
      # quarantine flag, sets +x, and runs the program in Terminal.
      - name: Package for macOS (zip + launcher)
        if: runner.os == 'macOS'
        run: |
          BIN="${{ matrix.artifact }}"
          STAGE="stage/ChromIQ-MeterCheck"
          mkdir -p "$STAGE"
          mv "dist/$BIN" "$STAGE/$BIN"
          chmod +x "$STAGE/$BIN"
          cat > "$STAGE/Double-click to run.command" <<LAUNCH
          #!/bin/bash
          cd "\$(dirname "\$0")"
          xattr -dr com.apple.quarantine "./$BIN" 2>/dev/null
          chmod +x "./$BIN"
          "./$BIN"
          echo
          echo "Finished - you can close this window."
          LAUNCH
          chmod +x "$STAGE/Double-click to run.command"
          printf '%s\n' \
            "How to run on macOS:" \
            "1. Double-click 'Double-click to run.command'." \
            "2. The first time, macOS may block it: right-click that file ->" \
            "   Open -> Open. After that it just runs." \
            > "$STAGE/READ ME.txt"
          rm -rf dist
          mkdir -p dist
          (cd stage && zip -r -X "../dist/$BIN.zip" "ChromIQ-MeterCheck")

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}*
